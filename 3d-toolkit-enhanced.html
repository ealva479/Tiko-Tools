<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Artist Toolkit Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-tertiary: #2d2d2d;
            --white: #ffffff;
            --off-white: #f5f5f5;
            --gray-300: #a3a3a3;
            --gray-400: #737373;
            --gray-500: #525252;
            --gray-600: #404040;
            --pink: #ffb3ba;
            --pink-dark: #ff8a93;
            --chrome: linear-gradient(135deg, #c0c0c0 0%, #f0f0f0 25%, #ffffff 50%, #f0f0f0 75%, #c0c0c0 100%);
            --gradient-subtle: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            --gradient-card: linear-gradient(135deg, #242424 0%, #1f1f1f 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--off-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header */
        header {
            padding: 60px 40px 40px 40px;
            border-bottom: 1px solid var(--gray-600);
            background: var(--gradient-subtle);
            position: sticky;
            top: 0;
            z-index: 90;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 48px;
            font-weight: 300;
            color: var(--white);
            letter-spacing: -1px;
            background: var(--chrome);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: var(--gray-300);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            border-radius: 8px;
            color: var(--off-white);
            font-size: 14px;
            width: 250px;
            transition: all 0.2s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--pink);
            width: 300px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            color: var(--gray-300);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--gray-600);
            color: var(--white);
        }

        .tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 100;
        }

        .icon-btn:hover .tooltip {
            opacity: 1;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 12px;
            margin: 30px 0 40px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--gray-600);
            border-radius: 8px;
            color: var(--gray-300);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--pink);
            background: rgba(255, 179, 186, 0.1);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #c0c0c0 0%, #ffffff 50%, #c0c0c0 100%);
            border-color: transparent;
            color: var(--bg-primary);
            font-weight: 600;
        }

        /* Tool Grid */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .tool-card {
            background: var(--gradient-card);
            border: 1px solid var(--gray-600);
            border-radius: 12px;
            padding: 32px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tool-card:hover {
            border-color: var(--pink);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .tool-icon {
            font-size: 28px;
            background: var(--chrome);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tool-category {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-300);
            font-weight: 500;
        }

        .tool-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--white);
        }

        .tool-description {
            font-size: 14px;
            color: var(--gray-300);
            line-height: 1.6;
            margin-bottom: 24px;
            min-height: 64px;
        }

        .tool-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #c0c0c0 0%, #f0f0f0 25%, #ffffff 50%, #f0f0f0 75%, #c0c0c0 100%);
            color: var(--bg-primary);
            font-weight: 600;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
            transform: rotate(45deg);
            transition: all 0.3s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--off-white);
            border: 1px solid var(--gray-600);
        }

        .btn-secondary:hover {
            background: var(--gray-600);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            animation: fadeIn 0.2s ease;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--gradient-card);
            border: 1px solid var(--gray-600);
            border-radius: 16px;
            padding: 48px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            color: var(--gray-300);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .modal-close:hover {
            background: var(--gray-600);
            color: var(--white);
        }

        .modal-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--gray-600);
        }

        .modal-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--white);
        }

        .modal-subtitle {
            font-size: 14px;
            color: var(--gray-300);
        }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--gray-500);
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 24px 0;
        }

        .upload-zone:hover {
            border-color: var(--pink);
            background: linear-gradient(135deg, rgba(255, 179, 186, 0.1), rgba(255, 138, 147, 0.1));
        }

        .upload-zone.drag-over {
            border-color: var(--pink);
            background: linear-gradient(135deg, rgba(255, 179, 186, 0.15), rgba(255, 138, 147, 0.15));
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 15px;
            color: var(--off-white);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 13px;
            color: var(--gray-400);
        }

        input[type="file"] {
            display: none;
        }

        /* Control Groups */
        .control-group {
            margin: 28px 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--gray-300);
            font-weight: 500;
        }

        .control-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--white);
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--gray-600);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--pink);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: var(--pink-dark);
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            border-radius: 8px;
            color: var(--off-white);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            margin: 12px 0;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 0 3px rgba(255, 179, 186, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* Preview Container */
        .preview-container {
            margin: 28px 0;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            display: none;
        }

        .preview-container.visible {
            display: block;
        }

        .preview-canvas {
            width: 100%;
            display: block;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 28px 0;
        }

        .result-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .result-label {
            font-size: 12px;
            color: var(--gray-400);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .result-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 8px;
        }

        .result-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .status-error {
            background: rgba(255, 179, 186, 0.2);
            color: var(--pink);
        }

        /* Comparison View */
        .comparison-view {
            margin: 28px 0;
            display: none;
        }

        .comparison-view.visible {
            display: block;
        }

        .comparison-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 16px;
        }

        .comparison-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
        }

        .comparison-slider {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .comparison-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .comparison-after {
            clip-path: inset(0 0 0 50%);
        }

        .comparison-divider {
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            height: 100%;
            background: var(--white);
            cursor: ew-resize;
            transform: translateX(-50%);
            z-index: 10;
        }

        .comparison-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: var(--white);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .comparison-divider::after {
            content: '⇄';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-primary);
            font-size: 18px;
            font-weight: 700;
            z-index: 1;
        }

        .comparison-labels {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-secondary);
            font-size: 13px;
            color: var(--gray-300);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-400);
        }

        .empty-state-icon {
            font-size: 72px;
            margin-bottom: 24px;
            opacity: 0.3;
            background: var(--chrome);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state-text {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--gray-300);
        }

        .empty-state-subtext {
            font-size: 14px;
        }

        /* Progress Bar */
        .progress-bar {
            display: none;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar.visible {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-dark), var(--pink));
            transition: width 0.3s ease;
            width: 0%;
        }

        /* Success Toast */
        .success-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #10b981, #6ee7b7);
            color: var(--bg-primary);
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .success-toast.visible {
            transform: translateY(0);
            opacity: 1;
        }

        /* Keyboard Shortcuts Hint */
        .keyboard-hint {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--bg-tertiary);
            border: 1px solid var(--gray-600);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--gray-300);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .keyboard-hint.visible {
            opacity: 1;
        }

        .kbd {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--gray-600);
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            margin: 0 2px;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--gray-600) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 40px 20px 30px 20px;
            }

            h1 {
                font-size: 36px;
            }

            .container {
                padding: 40px 20px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 32px 20px;
            }

            .search-box {
                width: 200px;
            }

            .search-box:focus {
                width: 100%;
            }
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--pink);
            animation: confetti 3s ease-out forwards;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>3D Artist Toolkit Pro</h1>
                <div class="subtitle">20 professional tools for game developers and 3D artists</div>
            </div>
            <div class="header-right">
                <input type="text" class="search-box" id="searchBox" placeholder="Search tools...">
                <button class="icon-btn" id="helpBtn">
                    ?
                    <span class="tooltip">Keyboard Shortcuts</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="category-filter">
            <button class="filter-btn active" data-category="all">All Tools</button>
            <button class="filter-btn" data-category="texture">Texture & Material</button>
            <button class="filter-btn" data-category="optimization">Optimization</button>
            <button class="filter-btn" data-category="uv">UV & Layout</button>
            <button class="filter-btn" data-category="workflow">Workflow</button>
        </div>

        <div class="tools-grid" id="toolsGrid">
            <!-- Tools will be inserted here -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="toolModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Tool Name</h2>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="success-toast" id="successToast">✓ Processing complete!</div>
    <div class="keyboard-hint" id="keyboardHint">
        Press <span class="kbd">Esc</span> to close • <span class="kbd">?</span> for help
    </div>

    <script>
        // Tool definitions - ALL 20 FULLY IMPLEMENTED
        const tools = [
            {
                id: 'normal-map-intensity',
                icon: '🗺️',
                category: 'texture',
                title: 'Normal Map Intensity',
                description: 'Adjust normal map strength with real-time preview. Perfect for fine-tuning bake results.',
                implemented: true
            },
            {
                id: 'texture-tiling',
                icon: '🔲',
                category: 'texture',
                title: 'Texture Tiling Preview',
                description: 'Preview how textures tile at different scales. Spot seams before importing.',
                implemented: true
            },
            {
                id: 'color-id',
                icon: '🎨',
                category: 'texture',
                title: 'Color ID Generator',
                description: 'Create color ID maps for texture painting workflows with smart region detection.',
                implemented: true
            },
            {
                id: 'pbr-validator',
                icon: '✅',
                category: 'texture',
                title: 'PBR Material Validator',
                description: 'Validate physically correct material values. Catch common PBR mistakes instantly.',
                implemented: true
            },
            {
                id: 'poly-estimator',
                icon: '📐',
                category: 'optimization',
                title: 'Poly Count Estimator',
                description: 'Estimate polygon count from reference images. Budget before modeling.',
                implemented: true
            },
            {
                id: 'memory-calculator',
                icon: '💾',
                category: 'optimization',
                title: 'Texture Memory Calculator',
                description: 'Calculate total VRAM usage for texture sets. Optimize for target platforms.',
                implemented: true
            },
            {
                id: 'lod-calculator',
                icon: '📏',
                category: 'optimization',
                title: 'LOD Distance Calculator',
                description: 'Calculate optimal LOD switch distances based on model size and complexity.',
                implemented: true
            },
            {
                id: 'batch-resizer',
                icon: '📦',
                category: 'texture',
                title: 'Batch Texture Resizer',
                description: 'Resize multiple textures with smart presets for different platforms.',
                implemented: true
            },
            {
                id: 'uv-density',
                icon: '📊',
                category: 'uv',
                title: 'UV Density Checker',
                description: 'Analyze UV density across your model. Find over/under-textured areas.',
                implemented: true
            },
            {
                id: 'trim-sheet',
                icon: '🗂️',
                category: 'uv',
                title: 'Trim Sheet Layout',
                description: 'Generate optimal trim sheet layouts with pixel density calculations.',
                implemented: true
            },

        // Render tools
        function renderTools(filter = 'all', search = '') {
            const grid = document.getElementById('toolsGrid');
            let filtered = tools;

            if (filter !== 'all') {
                filtered = filtered.filter(t => t.category === filter);
            }

            if (search) {
                const searchLower = search.toLowerCase();
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchLower) ||
                    t.description.toLowerCase().includes(searchLower)
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">No tools found</div>
                        <div class="empty-state-subtext">Try adjusting your filters or search term</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(tool => `
                <div class="tool-card" onclick="openTool('${tool.id}')">
                    <div class="tool-header">
                        <div class="tool-icon">${tool.icon}</div>
                        <div class="tool-category">${tool.category}</div>
                    </div>
                    <h3 class="tool-title">${tool.title}</h3>
                    <p class="tool-description">${tool.description}</p>
                    <div class="tool-actions">
                        <button class="btn btn-primary" onclick="event.stopPropagation(); openTool('${tool.id}')">
                            Launch Tool
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filter handling
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderTools(currentFilter, document.getElementById('searchBox').value);
            });
        });

        // Search handling
        document.getElementById('searchBox').addEventListener('input', (e) => {

                    confetti.style.background = ['#ffb3ba', '#6ee7b7', '#93c5fd', '#fcd34d'][Math.floor(Math.random() * 4)];
                    confetti.style.animationDelay = Math.random() * 0.3 + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
